# bridge_config.yaml
# Forwards topics between ROS 2 domains using the standard domain_bridge package.
#   sudo apt-get install -y ros-jazzy-domain-bridge
#   ros2 run domain_bridge domain_bridge config/bridge_config.yaml
# Run on both machines. Topic names stay the same on both sides.

topics:
  # apt-ipc (domain 99) → apt2 (domain 0)
  /rgb:
    type: sensor_msgs/msg/Image
    from_domain: 99
    to_domain: 0

  /depth:
    type: sensor_msgs/msg/Image
    from_domain: 99
    to_domain: 0

  /segmentation_mask:
    type: sensor_msgs/msg/Image
    from_domain: 99
    to_domain: 0

  /camera_info:
    type: sensor_msgs/msg/CameraInfo
    from_domain: 99
    to_domain: 0

  # apt2 (domain 0) → apt-ipc (domain 99)
  /tracking/output:
    type: vision_msgs/msg/Detection3DArray
    from_domain: 0
    to_domain: 99

  /tracking_visualization:
    type: sensor_msgs/msg/Image
    from_domain: 0
    to_domain: 99
