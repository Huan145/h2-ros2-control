# Environment for the perception visualizer:
#   nodes/perception/pose_overlay_visualizer_tracking_grasp.py
#
# NOTE: the name is legacy (originally created for YOLO work). It is kept
# because it is the env these nodes are actually run from. What the visualizer
# needs from it is OpenCV + rclpy + tf2; ultralytics/pytorch are leftovers from
# the earlier YOLO use and are not required by this repo's nodes.
#
# Python 3.12 is required to match ROS 2 Jazzy's rclpy.
#
# Create:
#   conda env create -f envs/yolo-env.yml
#   conda activate yolo-env
#   source /opt/ros/jazzy/setup.bash

name: yolo-env
channels:
  - conda-forge
dependencies:
  - python=3.12
  - opencv
  - numpy<2
  - pip
  - pip:
      - opencv-python==4.12.0
      - numpy==1.26.4
      - scipy==1.17.1
      # ROS 2 Jazzy Python client library + TF
      - rclpy==7.1.11
      - tf2-ros-py==0.36.20
      - tf2-geometry-msgs==0.36.20
      - tf2-py==0.36.20
      - tf2-msgs==0.36.20
