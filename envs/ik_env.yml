# Environment for the arm IK nodes:
#   nodes/control/H2_ik_node.py
#   nodes/control/H2_lift_node.py
#
# Python 3.12 is required — it must match the Python version of the ROS 2
# distro (Jazzy ships rclpy for 3.12). A mismatch gives:
#   ModuleNotFoundError: No module named 'rclpy._rclpy_pybind11'
#
# Create:
#   conda env create -f envs/ik_env.yml
#   conda activate ik_env
#   source /opt/ros/jazzy/setup.bash

name: ik_env
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pinocchio=3.1.0
  - numpy=1.26.4
  - scipy=1.11.4
  - pyyaml
  - pip
  - pip:
      # ROS 2 Jazzy Python client library
      - rclpy==7.1.11
      - empy==3.3.4
      - lark==1.1.9
